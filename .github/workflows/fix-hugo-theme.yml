name: Verify Hugo Theme Setup

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'config.toml'
      - 'themes/**'
      - '.github/workflows/fix-hugo-theme.yml'
  pull_request:
    paths:
      - 'config.toml'
      - 'themes/**'
      - '.github/workflows/fix-hugo-theme.yml'

jobs:
  verify-theme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.128.0'
          extended: true

      - name: Validate PaperMod theme presence
        run: |
          test -f themes/PaperMod/theme.toml
          grep -E '^theme = ["\'"'"']PaperMod["\'"'"']$' config.toml

      - name: Build site
        run: hugo --gc --minify
