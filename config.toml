baseURL = 'https://blog.srlines.net/'
languageCode = 'en-us'
title = 'SRLINES Blog'
theme = 'PaperMod'

[pagination]
  pagerSize = 12

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

[params]
  description = 'Actionable WhatsApp automation, API, and growth guides from SRLINES.'
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowShareButtons = true

