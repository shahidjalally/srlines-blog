{{ define "main" }}
  <section class="hero">
    <h1>{{ .Title }}</h1>
    {{ if .Content }}<div class="content">{{ .Content }}</div>{{ end }}
  </section>

  {{ range .Pages }}
    <article class="card">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p class="meta">{{ .Date.Format "Jan 2, 2006" }}</p>
      <p class="excerpt">{{ with .Description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}</p>
    </article>
  {{ end }}
{{ end }}
