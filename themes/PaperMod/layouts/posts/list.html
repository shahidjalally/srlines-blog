{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ $p := .Paginate .Pages }}
  {{ range $p.Pages }}
    <article>
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p class="meta">{{ .Date.Format "Jan 2, 2006" }}</p>
      <p>{{ with .Description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}</p>
    </article>
  {{ end }}
  {{ partial "pagination.html" . }}
{{ end }}
