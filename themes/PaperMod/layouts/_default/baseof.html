<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
    <style>
      body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; max-width: 860px; margin: 0 auto; padding: 2rem 1rem; line-height: 1.65; color: #1f2937; }
      a { color: #2563eb; text-decoration: none; }
      a:hover { text-decoration: underline; }
      header, footer { margin-bottom: 2rem; }
      nav a { margin-right: 1rem; }
      article { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb; }
      .meta { color: #6b7280; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <header>
      <h1><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
      <p>{{ .Site.Params.description }}</p>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer>
      <small>© {{ now.Year }} {{ .Site.Title }}</small>
    </footer>
  </body>
</html>
