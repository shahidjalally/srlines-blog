<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
    <link rel="stylesheet" href="{{ "css/core.css" | relURL }}" />
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <h1><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
        <p>{{ .Site.Params.description }}</p>
        <form class="search-inline" action="{{ "search/" | relURL }}" method="get">
          <input type="search" name="q" placeholder="Search posts..." />
          <button type="submit">Search</button>
        </form>
      </header>
      <div class="layout">
        <main class="main-panel">{{ block "main" . }}{{ end }}</main>
        <aside class="side-panel">{{ partial "sidebar.html" . }}</aside>
      </div>
      <footer class="site-footer"><small>© {{ now.Year }} {{ .Site.Title }}</small></footer>
    </div>
  </body>
</html>
