<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; margin: 0; line-height: 1.65; color: #1f2937; background: #f8fafc; }
      .container { max-width: 1120px; margin: 0 auto; padding: 1.5rem 1rem 2rem; }
      a { color: #2563eb; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .site-header { margin-bottom: 1.25rem; }
      .site-header h1 { margin: 0; font-size: 1.8rem; }
      .site-header p { margin: .4rem 0 0; color: #4b5563; }
      .search-inline { margin-top: .75rem; display: flex; gap: .5rem; }
      .search-inline input { padding: .55rem .7rem; border: 1px solid #cbd5e1; border-radius: .5rem; width: min(420px, 100%); }
      .layout { display: grid; grid-template-columns: minmax(0,1fr) 290px; gap: 1.5rem; align-items: start; }
      .main-panel, .side-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: .8rem; }
      .main-panel { padding: 1rem 1.2rem; }
      .side-panel { padding: 1rem; position: sticky; top: 1rem; }
      article { margin-bottom: 1.4rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb; }
      article:last-child { border-bottom: 0; }
      .meta { color: #6b7280; font-size: .92rem; margin: .15rem 0 .4rem; }
      .pagination { margin-top: 1rem; display: flex; gap: .5rem; flex-wrap: wrap; }
      .pagination a, .pagination span { border: 1px solid #cbd5e1; border-radius: .45rem; padding: .25rem .65rem; font-size: .92rem; }
      .pagination .active { background: #e2e8f0; font-weight: 600; }
      .sidebar-section { margin-bottom: 1rem; }
      .sidebar-section h3 { margin: 0 0 .4rem; font-size: 1rem; }
      .sidebar-section ul { margin: 0; padding-left: 1rem; }
      .sidebar-section li { margin-bottom: .25rem; }
      .site-footer { margin-top: 1.25rem; color: #64748b; font-size: .9rem; }
      .search-results li { margin-bottom: .45rem; }
      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
        .side-panel { position: static; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <h1><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
        <p>{{ .Site.Params.description }}</p>
        <form class="search-inline" action="{{ "search/" | relURL }}" method="get">
          <input type="search" name="q" placeholder="Search posts..." value="{{ .Get "q" }}" />
          <button type="submit">Search</button>
        </form>
      </header>
      <div class="layout">
        <main class="main-panel">
          {{ block "main" . }}{{ end }}
        </main>
        <aside class="side-panel">
          {{ partial "sidebar.html" . }}
        </aside>
      </div>
      <footer class="site-footer">
        <small>© {{ now.Year }} {{ .Site.Title }}</small>
      </footer>
    </div>
  </body>
</html>
